<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>₹</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Top Bar for Tabs -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('orchestrate-tab')">Orchestrate</button>
            <button class="tab-btn" onclick="switchTab('single-call-tab')">Single Call</button>
        </div>

        <!-- Orchestrate Tab -->
        <div id="orchestrate-tab" class="tab-content active">
            <div class="card">
                <h2>Trigger All Calls</h2>
                <div class="action-area">
                    <button id="trigger-all-btn" class="primary-btn">Initiate Calls</button>
                </div>
            </div>
        </div>

        <!-- Single Call Tab -->
        <div id="single-call-tab" class="tab-content">
            <div class="card">
                <h2>Trigger One Call</h2>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" placeholder="e.g. 9876543210">
                </div>
                <div class="form-group">
                    <label for="client_name">Client Name</label>
                    <input type="text" id="client_name" placeholder="e.g. Aryan">
                </div>
                <div class="action-area">
                    <button id="trigger-single-btn" class="primary-btn">Initiate Call</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script type="module" src="/script.js"></script>
</body>
</html>
